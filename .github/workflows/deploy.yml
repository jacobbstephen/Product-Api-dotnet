name: Deploy to VM

on:
  workflow_run:
    workflows: [".NET CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - name: Pull latest Docker image
        run: docker pull jacbstpn/productapi:latest

      - name: Stop and remove old container
        run: |
          docker stop productapi || true
          docker rm productapi || true

      - name: Start new container
        run: |
          docker run -d \
            -p 5000:8080 \
            --name productapi \
            jacbstpn/productapi:latest