name: Deploy to VM

on:
  workflow_run:
    workflows: [".NET CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VM
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            docker pull jacbstpn/productapi:latest
            docker stop productapi || true
            docker rm productapi || true
            docker run -d -p 5000:8080 --name productapi jacbstpn/productapi:latest
          EOF